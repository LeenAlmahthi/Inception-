services: # Mandatory Inception services: MariaDB + WordPress + NGINX
  mariadb:
    container_name: mariadb
    build:
      context: ./srcs/requirements/mariadb # Build MariaDB image from local Dockerfile
    image: mariadb # Local image tag name
    env_file:
      - .env # Load DB credentials/config from .env
    restart: always # Restart container automatically if it stops
    volumes:
      - mariadb_data:/var/lib/mysql # Persist MariaDB database files
    networks:
      - inception # Internal Docker network shared by all services

  wordpress:
    container_name: wordpress
    build:
      context: ./srcs/requirements/wordpress # Build WordPress/PHP-FPM image locally
    image: wordpress # Local image tag name
    env_file:
      - .env # Load WordPress + DB connection variables
    restart: always # Restart container automatically if it stops
    depends_on:
      - mariadb # Start order: MariaDB first, then WordPress
    volumes:
      - wordpress_data:/var/www/html # Persist WordPress files (core/content/uploads)
    networks:
      - inception

  nginx:
    container_name: nginx
    build:
      context: ./srcs/requirements/nginx # Build NGINX image locally
    image: nginx # Local image tag name
    env_file:
      - .env # Optional runtime variables from .env
    restart: always # Restart container automatically if it stops
    depends_on:
      - wordpress # Start order: WordPress before NGINX
    ports:
      - "443:443" # Mandatory public HTTPS entrypoint
    volumes:
      - wordpress_data:/var/www/html # Read WordPress files to serve site through NGINX
    networks:
      - inception

volumes:
  mariadb_data: # Host-persistent storage for MariaDB data
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/mariadb # Required host path for DB persistence
      o: bind

  wordpress_data: # Host-persistent storage for WordPress files
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/wordpress
      o: bind

networks: # Dedicated internal bridge network (not host mode)
  inception:
    driver: bridge